<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGENDAMIENTO DE CITAS</title>
    <link rel="stylesheet" href="../css/cita.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <nav>
                <ul class="nav-list">
                    <li><a href="barberos.php" class="nav-item">INICIO</a></li>
                    <li><a href="carrito1.html" class="nav-item">PRODUCTOS</a></li>
                </ul>
            </nav>
            <img src="../imagenes/bar-ber-go.png" alt="Logo" class="header-image">
        </div>
    </header>
    <br><br>
    <main class="main-content">
        <section id="booking" class="booking-section">
            <h2>Agendar Cita</h2>
            <form action="#" method="post" class="booking-form">
                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Teléfono:</label>
                <input type="tel" id="phone" name="phone" required>

                <button type="button" class="submit-button">Agendar Cita</button>
            </form>
        </section>
    </main>
        <section class="video-section">
            <div class="video-container">
                <video autoplay loop>
                    <source src="../imagenes/juancho.mp4" type="video/mp4">
                </video>
            </div>
        </section>
   <br><br><br><br>
    
    <footer class="footer">
        <p>&copy; 2024 BAR_BER_GO.</p>
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', (event) => {
            const submitButton = document.querySelector('.submit-button');
            const apiUrl = 'http://localhost:8000/api/agendamientos'; //  URL de la API REST

            submitButton.addEventListener('click', () => {
                // Obtener los valores de los campos del formulario
                const nombre = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const celular = document.getElementById('phone').value;

                // Validar los campos
                if (!nombre || !email || !celular) {
                    alert('Por favor, complete todos los campos');
                    return;
                }

                // Crear un objeto con los datos para enviar
                const cita = {
                    nombre: nombre,
                    email: email,
                    celular: celular
                };

                // Enviar los datos al servidor usando fetch
                fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(cita) // Convertir el objeto a JSON
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Cita agendada:', data); // Mostrar la respuesta de la API
                    alert('Tu cita ha sido agendada correctamente');
                    window.location.href = 'calificaciones.html'; // Redirigir a la página de calificaciones
                })
                .catch(error => {
                    console.error('Error al agendar la cita:', error);
                    alert('Hubo un error al agendar la cita. Intenta nuevamente');
                });
            });
        });
    </script>
</body>
</html>
